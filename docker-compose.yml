version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - sentinel-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-api
    ports:
      - "8020:8020"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=INFO
      - PORT=8020
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - RATE_LIMIT_ENABLED=true
      - METRICS_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  sentinel-network:
    driver: bridge
