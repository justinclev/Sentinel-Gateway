stages:
  - test
  - lint
  - build

variables:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.0"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/poetry"

# Cache dependencies to speed up builds
.python-cache: &python-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-python
    paths:
      - .cache/pip
      - .cache/poetry
      - .venv

# Unit Tests
test:unit:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  <<: *python-cache
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl
    - pip install --upgrade pip
    - pip install poetry==${POETRY_VERSION}
    - poetry config virtualenvs.in-project true
    - poetry install --with dev --no-interaction --no-ansi
  script:
    - poetry run pytest tests/unit/ -v --cov=app --cov-report=term --cov-report=xml --cov-report=html
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
      - coverage.xml
    expire_in: 30 days
  only:
    - branches
    - merge_requests

# Linting with Ruff
lint:ruff:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  <<: *python-cache
  before_script:
    - pip install --upgrade pip
    - pip install poetry==${POETRY_VERSION}
    - poetry config virtualenvs.in-project true
    - poetry install --with dev --no-interaction --no-ansi
  script:
    - poetry run ruff check app/ tests/
  allow_failure: false
  only:
    - branches
    - merge_requests

# Code formatting check with Black
lint:black:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  <<: *python-cache
  before_script:
    - pip install --upgrade pip
    - pip install poetry==${POETRY_VERSION}
    - poetry config virtualenvs.in-project true
    - poetry install --with dev --no-interaction --no-ansi
  script:
    - poetry run black --check app/ tests/
  allow_failure: false
  only:
    - branches
    - merge_requests

# Type checking with mypy
lint:mypy:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  <<: *python-cache
  before_script:
    - pip install --upgrade pip
    - pip install poetry==${POETRY_VERSION}
    - poetry config virtualenvs.in-project true
    - poetry install --with dev --no-interaction --no-ansi
  script:
    - poetry run mypy app/
  allow_failure: true  # Can be strict if your codebase is fully typed
  only:
    - branches
    - merge_requests

# Build and push Docker image
build:docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
    IMAGE_LATEST: ${CI_REGISTRY_IMAGE}:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t ${IMAGE_TAG} -t ${IMAGE_LATEST} .
    - docker push ${IMAGE_TAG}
    - docker push ${IMAGE_LATEST}
  only:
    - main
    - develop
    - tags

# Build for merge requests (no push)
build:docker:mr:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t sentinel-gateway:${CI_COMMIT_SHORT_SHA} .
  only:
    - merge_requests
